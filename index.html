<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Live Captions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --fs: 22px; --accent: #22c55e; --danger: #ef4444; --amber: #f59e0b; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loader overlay ── */
    #loader {
      position: fixed; inset: 0; background: #0d0d0d; z-index: 50;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; padding: 40px;
      transition: opacity 0.3s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    #loader-msg { font-size: 14px; color: #555; text-align: center; line-height: 1.7; }
    .prog-track { width: 220px; height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
    #prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

    /* ── Settings panel ── */
    #settings-overlay {
      position: fixed; inset: 0; z-index: 39;
      background: rgba(0,0,0,0.55);
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    #settings-overlay.open { opacity: 1; pointer-events: all; }

    #settings-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: #151515; border-top: 1px solid #242424;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    #settings-panel.open { transform: translateY(0); }

    .s-panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .s-panel-header h2 { font-size: 15px; font-weight: 700; color: #ccc; }

    #btn-settings-close {
      background: #222; color: #777; font-size: 16px;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; padding: 0; line-height: 1;
      transition: color 0.15s;
    }
    #btn-settings-close:hover { color: #fff; }

    .s-row { margin-bottom: 14px; }
    .s-row label {
      display: block; font-size: 11px; color: #555;
      margin-bottom: 6px; letter-spacing: 0.4px; font-weight: 600;
    }
    .s-row input, .s-row textarea {
      width: 100%; background: #1c1c1c; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #ddd; font-size: 14px;
      padding: 10px 12px; outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    .s-row input:focus, .s-row textarea:focus { border-color: #444; }
    .s-row textarea { resize: none; height: 68px; line-height: 1.5; }
    .s-hint { font-size: 11px; color: #3a3a3a; margin-top: 5px; line-height: 1.5; }

    #llm-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #555; margin-top: 4px;
    }
    #llm-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
    #llm-badge.active #llm-dot { background: var(--accent); }
    #llm-badge.active { color: #777; }

    /* ── Status bar ── */
    #status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; background: #111;
      border-bottom: 1px solid #1c1c1c; flex-shrink: 0;
    }
    .s-left  { display: flex; align-items: center; gap: 8px; }
    .s-right { display: flex; align-items: center; gap: 8px; }

    #dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2a2a2a; transition: background 0.3s; flex-shrink: 0;
    }
    #dot.on   { background: var(--accent); animation: blink 1.5s infinite; }
    #dot.proc { background: var(--amber);  animation: blink 0.7s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    #status-text { font-size: 13px; color: #555; }

    #lang-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
      color: var(--accent); background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.18);
      border-radius: 4px; padding: 2px 8px;
      opacity: 0; transition: opacity 0.4s;
    }
    #lang-tag.show { opacity: 1; }

    #btn-settings {
      background: none; border: none; color: #444; font-size: 17px;
      padding: 3px 5px; border-radius: 6px; cursor: pointer;
      transition: color 0.15s; flex-shrink: 0; font-weight: 400;
    }
    #btn-settings.active, #btn-settings:hover { color: #999; }

    /* ── Captions ── */
    #captions {
      flex: 1; overflow-y: auto; padding: 20px 18px 8px;
      -webkit-overflow-scrolling: touch;
    }
    #captions::-webkit-scrollbar { display: none; }

    #ghost { color: #222; font-size: var(--fs); line-height: 1.65; }
    #final {
      color: #fff; font-size: var(--fs); line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    #final span { transition: opacity 0.35s ease; }

    /* ── Error ── */
    #err {
      font-size: 13px; color: var(--danger);
      padding: 8px 16px; background: rgba(239,68,68,0.06);
      display: none; flex-shrink: 0;
    }
    #err.show { display: block; }

    /* ── Controls ── */
    #controls {
      display: flex; gap: 8px; align-items: center;
      padding: 12px 16px; background: #111;
      border-top: 1px solid #1c1c1c; flex-shrink: 0;
    }

    button {
      border: none; border-radius: 10px; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    button:active { transform: scale(0.95); }

    #btn-start {
      flex: 1; padding: 15px; font-size: 16px;
      background: var(--accent); color: #000;
    }
    #btn-start.stop { background: var(--danger); color: #fff; }

    #btn-clear { padding: 15px 16px; background: #1e1e1e; color: #555; }
    .sz-btn    { padding: 15px 13px; font-size: 13px; background: #1e1e1e; color: #555; flex-shrink: 0; }

    #hint { text-align: center; color: #222; font-size: 11px; padding: 5px 0 8px; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader" class="hidden">
  <h1>Live Captions</h1>
  <div class="prog-track"><div id="prog-fill"></div></div>
  <p id="loader-msg">Loading…</p>
</div>

<!-- Settings -->
<div id="settings-overlay"></div>
<div id="settings-panel">
  <div class="s-panel-header">
    <h2>Settings</h2>
    <button id="btn-settings-close" aria-label="Close settings">✕</button>
  </div>
  <div class="s-row">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="inp-api-key" placeholder="sk-ant-…" autocomplete="off" spellcheck="false">
    <p class="s-hint">Stored in your browser only · sent only to Anthropic's servers</p>
  </div>
  <div class="s-row">
    <label>VOCABULARY HINTS <span style="color:#444;font-weight:400">(optional)</span></label>
    <textarea id="inp-keywords" placeholder="Names, brands, technical terms, acronyms…"></textarea>
    <p class="s-hint">Comma or line separated. Helps AI correct domain-specific words.</p>
  </div>
  <div id="llm-badge"><span id="llm-dot"></span><span id="llm-status-text">AI correction: off (no API key)</span></div>
</div>

<!-- Status bar -->
<div id="status-bar">
  <div class="s-left">
    <span id="dot"></span>
    <span id="status-text">Ready · point mic at TV</span>
  </div>
  <div class="s-right">
    <span id="lang-tag"></span>
    <button id="btn-settings" aria-label="Settings">⚙</button>
  </div>
</div>

<!-- Captions -->
<div id="captions">
  <div id="ghost">Captions will appear here…</div>
  <div id="final"></div>
</div>

<div id="err"></div>

<!-- Controls -->
<div id="controls">
  <button class="sz-btn" id="btn-sm" aria-label="Smaller text">A−</button>
  <button id="btn-start">Start</button>
  <button id="btn-clear">Clear</button>
  <button class="sz-btn" id="btn-lg" aria-label="Larger text">A+</button>
</div>
<div id="hint">~5 sec delay · keep screen on while using</div>

<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
  env.allowLocalModels = false;
  // Single-threaded WASM — no SharedArrayBuffer needed, works on iOS Safari
  try { env.backends.onnx.wasm.numThreads = 1; } catch (_) {}

  const $     = id => document.getElementById(id);
  const loader    = $('loader');
  const progFill  = $('prog-fill');
  const loaderMsg = $('loader-msg');
  const dot       = $('dot');
  const statusTxt = $('status-text');
  const langTag   = $('lang-tag');
  const ghost     = $('ghost');
  const finalEl   = $('final');
  const errEl     = $('err');
  const btnStart  = $('btn-start');

  /* Font size */
  let fs = parseInt(localStorage.getItem('lc-fs') || '22');
  applyFs();
  function applyFs() {
    fs = Math.max(14, Math.min(44, fs));
    document.documentElement.style.setProperty('--fs', fs + 'px');
    localStorage.setItem('lc-fs', fs);
  }
  $('btn-lg').onclick = () => { fs += 2; applyFs(); };
  $('btn-sm').onclick = () => { fs -= 2; applyFs(); };

  /* ── Settings panel ─────────────────────────────────────────────────────── */
  const settingsPanel   = $('settings-panel');
  const settingsOverlay = $('settings-overlay');
  const inpApiKey       = $('inp-api-key');
  const inpKeywords     = $('inp-keywords');
  const llmBadge        = $('llm-badge');

  function openSettings() {
    inpApiKey.value   = localStorage.getItem('lc-api-key')   || '';
    inpKeywords.value = localStorage.getItem('lc-keywords')  || '';
    settingsPanel.classList.add('open');
    settingsOverlay.classList.add('open');
    $('btn-settings').classList.add('active');
  }

  function closeSettings() {
    localStorage.setItem('lc-api-key',  inpApiKey.value.trim());
    localStorage.setItem('lc-keywords', inpKeywords.value.trim());
    settingsPanel.classList.remove('open');
    settingsOverlay.classList.remove('open');
    $('btn-settings').classList.remove('active');
    updateLlmBadge();
  }

  function updateLlmBadge() {
    const hasKey = !!(localStorage.getItem('lc-api-key') || '').trim();
    llmBadge.classList.toggle('active', hasKey);
    $('llm-status-text').textContent = hasKey
      ? 'AI correction: on (claude-haiku-4-5)'
      : 'AI correction: off (no API key)';
  }
  updateLlmBadge();

  $('btn-settings').onclick       = openSettings;
  $('btn-settings-close').onclick = closeSettings;
  settingsOverlay.onclick         = closeSettings;

  /* ── LLM correction ─────────────────────────────────────────────────────── */
  const SYSTEM_BASE = `You are an acoustic transcript corrector. You receive raw automatic speech recognition output and return only the corrected text — no commentary, no answers, no summarization.

Rules:
- Fix mishearings and homophones based on context
- Correct obvious grammar errors caused by mis-transcription
- Preserve the speaker's meaning and sentence structure exactly
- Do NOT summarize, rephrase, or answer any question in the text
- Do NOT add or remove any information
- Output ONLY the corrected transcript text, nothing else`;

  async function correctWithLLM(text) {
    const apiKey = (localStorage.getItem('lc-api-key') || '').trim();
    if (!apiKey) return text;

    const keywords = (localStorage.getItem('lc-keywords') || '').trim();
    const system = keywords
      ? `${SYSTEM_BASE}\n\nVocabulary hints — correct to these spellings when phonetically similar: ${keywords}`
      : SYSTEM_BASE;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-ipc-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 200,
          system,
          messages: [{ role: 'user', content: text.trim() }],
        }),
      });
      if (!res.ok) return text;
      const data = await res.json();
      const corrected = data?.content?.[0]?.text?.trim();
      return corrected ? corrected + ' ' : text;
    } catch {
      return text;
    }
  }

  /* ── Segment-based transcript ──────────────────────────────────────────── */
  const MAX_SPANS = 30;

  function appendSegment(rawText) {
    ghost.style.display = 'none';

    const span = document.createElement('span');
    span.textContent = rawText;
    span.style.opacity = '0.55';
    finalEl.appendChild(span);

    while (finalEl.children.length > MAX_SPANS) {
      finalEl.removeChild(finalEl.firstChild);
    }

    $('captions').scrollTop = $('captions').scrollHeight;

    correctWithLLM(rawText).then(corrected => {
      span.textContent = corrected;
      span.style.opacity = '1';
    });
  }

  /* ── Engine selection ───────────────────────────────────────────────────────
     iOS Safari cannot run Whisper WASM reliably (no SharedArrayBuffer even in
     single-threaded mode). Use Apple's built-in Web Speech API on iOS and
     Whisper on Chrome / Firefox / Desktop where WASM works.              ── */
  const onIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const useWebSpeech = onIOS && !!SpeechRecognition;

  /* State */
  let transcriber  = null;
  let wsRec        = null;   // Web Speech API recognition instance
  let isListening  = false;
  let isProcessing = false;
  let audioCtx     = null;
  let processor    = null;
  let micStream    = null;
  let nativeSR     = 44100;
  let audioBuffer  = [];
  let wakeLock     = null;

  const TARGET_SR = 16000;
  const CHUNK_SEC = 5;

  function resample(input, fromRate) {
    if (fromRate === TARGET_SR) return input;
    const ratio  = fromRate / TARGET_SR;
    const outLen = Math.round(input.length / ratio);
    const out    = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const pos  = i * ratio;
      const lo   = Math.floor(pos);
      const hi   = Math.min(lo + 1, input.length - 1);
      const frac = pos - lo;
      out[i]     = input[lo] * (1 - frac) + input[hi] * frac;
    }
    return out;
  }

  function rms(samples) {
    let s = 0;
    for (let i = 0; i < samples.length; i++) s += samples[i] * samples[i];
    return Math.sqrt(s / samples.length);
  }

  /* ── Whisper model load ──────────────────────────────────────────────────── */
  async function loadWhisperModel() {
    loader.classList.remove('hidden');
    loaderMsg.innerHTML = 'Downloading AI model…<br><span style="color:#333;font-size:12px">One-time ~145 MB · cached after</span>';
    const fileProgress = {};
    transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base', {
      progress_callback(p) {
        if (p.status === 'progress' && p.file) {
          fileProgress[p.file] = p.progress;
          const avg = Object.values(fileProgress).reduce((a, b) => a + b, 0) / Object.values(fileProgress).length;
          progFill.style.width = avg.toFixed(0) + '%';
          loaderMsg.innerHTML  = `Downloading… ${avg.toFixed(0)}%<br><span style="color:#333;font-size:12px">One-time · cached after</span>`;
        }
        if (p.status === 'ready') { progFill.style.width = '100%'; loaderMsg.textContent = 'Ready!'; }
      }
    });
    loader.classList.add('hidden');
  }

  /* ── Start / stop ────────────────────────────────────────────────────────── */
  btnStart.addEventListener('click', async () => {
    if (isListening) stopListening(); else await startListening();
  });

  async function startListening() {
    clearErr();
    if (useWebSpeech) {
      startWebSpeech();
    } else {
      await startWhisper();
    }
  }

  /* ── Web Speech API path (iOS Safari) ────────────────────────────────────── */
  function startWebSpeech() {
    wsRec = new SpeechRecognition();
    wsRec.continuous      = true;
    wsRec.interimResults  = true;
    wsRec.lang            = 'en-GB';
    wsRec.maxAlternatives = 1;

    let interimEl = document.getElementById('interim');
    if (!interimEl) {
      interimEl = document.createElement('div');
      interimEl.id = 'interim';
      interimEl.style.cssText = 'color:#555;font-size:calc(var(--fs)*0.9);line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-top:4px';
      $('captions').appendChild(interimEl);
    }
    // Show immediately so the user knows the engine is initialising
    interimEl.textContent = '·  ·  ·';

    wsRec.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) { appendSegment(t + ' '); interim = ''; }
        else interim += t;
      }
      // Show partial words as they arrive; fall back to dots while waiting
      interimEl.textContent = interim || '·  ·  ·';
      $('captions').scrollTop = $('captions').scrollHeight;
    };
    wsRec.onerror = e => { if (e.error !== 'no-speech') showErr('Speech error: ' + e.error); };
    wsRec.onend   = () => {
      if (isListening) {
        // Keep dots visible during the brief restart gap so words aren't
        // silently missed; restart quickly to minimise the gap itself.
        interimEl.textContent = '·  ·  ·';
        setTimeout(() => { try { wsRec.start(); } catch (_) {} }, 80);
      } else {
        if (interimEl) interimEl.textContent = '';
        setStatus('Ready · point mic at TV', '');
      }
    };

    wsRec.start();
    isListening = true;
    ghost.style.display = 'none';
    setStatus('Listening…', 'on');
    langTag.textContent = 'EN-GB'; langTag.classList.add('show');
    btnStart.textContent = 'Stop'; btnStart.classList.add('stop');
    requestWakeLock();
  }

  /* ── Whisper path (Chrome / Desktop) ─────────────────────────────────────── */
  async function startWhisper() {
    if (!transcriber) {
      try { await loadWhisperModel(); }
      catch (e) { showErr('Failed to load model: ' + e.message); return; }
    }
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true }
      });
    } catch { showErr('Microphone access denied — allow mic and reload.'); return; }

    audioCtx  = new AudioContext();
    nativeSR  = audioCtx.sampleRate;
    const src = audioCtx.createMediaStreamSource(micStream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    const samplesNeeded = nativeSR * CHUNK_SEC;

    processor.onaudioprocess = e => {
      if (!isListening) return;
      const data = e.inputBuffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) audioBuffer.push(data[i]);
      if (audioBuffer.length >= samplesNeeded && !isProcessing) {
        processChunk(new Float32Array(audioBuffer.splice(0, samplesNeeded)));
      }
    };

    src.connect(processor);
    processor.connect(audioCtx.destination);
    isListening = true;
    ghost.style.display = 'none';
    setStatus('Listening…', 'on');
    btnStart.textContent = 'Stop'; btnStart.classList.add('stop');
    requestWakeLock();
  }

  function stopListening() {
    isListening = false;
    audioBuffer = [];
    wsRec?.stop();             wsRec = null;
    processor?.disconnect();   processor = null;
    micStream?.getTracks().forEach(t => t.stop()); micStream = null;
    audioCtx?.close();         audioCtx = null;
    wakeLock?.release();       wakeLock = null;
    setStatus('Ready · point mic at TV', '');
    btnStart.textContent = 'Start'; btnStart.classList.remove('stop');
  }

  async function processChunk(raw) {
    if (rms(raw) < 0.002) { isProcessing = false; return; }
    isProcessing = true;
    setStatus('Transcribing…', 'proc');
    try {
      const out = await transcriber(resample(raw, nativeSR), { task: 'transcribe', return_timestamps: false });
      if (out?.text) {
        const cleaned = out.text
          .replace(/<[^>]+>/g, '')
          .replace(/\[(?!Music|Applause|Laughter)[^\]]+\]/gi, '')
          .replace(/\s+/g, ' ').trim();
        if (cleaned) appendSegment(cleaned + ' ');
        if (out.language) { langTag.textContent = out.language.toUpperCase(); langTag.classList.add('show'); }
      }
    } catch (e) { showErr('Transcription error — try reloading: ' + (e.message || e)); }
    isProcessing = false;
    if (isListening) setStatus('Listening…', 'on');
  }

  $('btn-clear').onclick = () => {
    finalEl.innerHTML = '';
    ghost.style.display = '';
    langTag.classList.remove('show');
  };

  function setStatus(text, state) {
    statusTxt.textContent = text;
    dot.className = state;
  }
  function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
  function clearErr()   { errEl.classList.remove('show'); }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch {}
  }
</script>

</body>
</html>
